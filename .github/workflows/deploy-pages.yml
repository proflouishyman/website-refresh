name: Deploy Website To GitHub Pages

on:
  push:
    branches:
      - main
  # Some protected repos suppress deploy-on-push after squash merges; run on merged PR close too.
  pull_request_target:
    branches:
      - main
    types:
      - closed
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    # Run for pushes and manual dispatch; for PR-close events, deploy only when merged.
    if: ${{ github.event_name != 'pull_request_target' || github.event.pull_request.merged == true }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      # Pull repository contents for this workflow run.
      - name: Checkout
        uses: actions/checkout@v4

      # Configure GitHub Pages for this repository.
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # First deployment can fail if Pages is not enabled yet.
          enablement: true

      # Upload the static site folder as the deployable artifact.
      - name: Upload Site Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./html5up-editorial

      # Publish the uploaded artifact to GitHub Pages.
      - name: Deploy To GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
